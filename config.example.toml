# ws2tcp-router configuration example.
# CLI arguments override values from this file.

bind = "::"
service-mode = "ws-only"
port = 80
tls-port = 443
ipv6-only = false
buffer-size = 16384

# HTTP Basic authentication is disabled when both options are omitted.
# basic-auth = ["alice:secret", "bob:secret2"]
# basic-auth-file = "./users.txt"

# Configure both TLS fields to serve WSS.
# tls-cert = "./cert.pem"
# tls-key = "./key.pem"

# Or generate an in-memory 10-year self-signed certificate for WSS.
# auto-self-signed-cert = true

# log-file = "./logs/ws2tcp-router.log"
# log-level = "ws2tcp_router=info"
